apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-root-app
  namespace: openshift-gitops
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/abduselamh/gitops-sample-example.git
    targetRevision: HEAD
    path: argocd/apps/environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
