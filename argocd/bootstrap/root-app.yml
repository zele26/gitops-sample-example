apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-root-app
  namespace: default
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sample-project
  source:
    repoURL: https://github.com/kasahun-welela/gitops-sample-example
    targetRevision: HEAD
    path: argocd/apps/environments/dev/
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true